<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeLiLu.ai - Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 12px;
            flex-shrink: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }

        .new-chat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background-color: #ffe082;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            transition: background-color 0.2s;
        }

        .new-chat:hover {
            background-color: #ffd54f;
        }

        .search-chat {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .search-chat:hover {
            background-color: #f5f5f5;
        }

        .section-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
            padding: 0 8px;
        }

        .conversation-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .conversation-item:hover {
            background-color: #f5f5f5;
        }

        .conversation-title {
            font-size: 14px;
            color: #333;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-preview {
            font-size: 12px;
            color: #999;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fafafa;
            position: relative;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #ffffff;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .menu-toggle-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle-btn:hover {
            background-color: #f0f0f0;
        }

        .chat-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .empty-state {
            text-align: center;
            color: #666;
            font-size: 18px;
        }

        .input-container {
            padding: 20px 24px 24px;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px 20px;
            background-color: #ffffff;
            border: 2px solid #ffe082;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            transition: border-color 0.2s;
        }

        .input-box:focus-within {
            border-color: #ffd54f;
            outline: none;
        }

        .add-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .add-btn:hover {
            color: #333;
        }

        .chat-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background: transparent;
        }

        .chat-input::placeholder {
            color: #999;
        }

        .mic-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: #666;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .mic-btn:hover {
            background-color: #f5f5f5;
            color: #333;
        }

        .powered-by {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
            font-size: 12px;
            color: #999;
        }

        .gemini-badge {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 8px;
            background-color: #f0f0f0;
            border-radius: 12px;
            font-size: 11px;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                z-index: 300;
                transform: translateX(0);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.3);
                z-index: 250;
            }

            .overlay.active {
                display: block;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <button class="new-chat">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
                New Chat
            </button>

            <div class="search-chat">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <span>Search Chat</span>
            </div>

            <div class="section-title">Percakapan</div>

            <div class="conversation-item">
                <div class="conversation-title">Lorem ipsum dolor sit amet, consectetur...</div>
                <div class="conversation-preview">sed do eiusmod tempor incididunt ut labore</div>
            </div>
            <div class="conversation-item">
                <div class="conversation-title">magna aliqua. Ut enim ad minim veniam</div>
                <div class="conversation-preview">uis nostrud exercitation ullamco laboris ut...</div>
            </div>
        </aside>

        <div class="overlay" id="overlay"></div>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle-btn" id="menuToggleBtn" title="Menu">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                        </svg>
                    </button>
                    <h1 class="header-title">LeLiLu.ai</h1>
                </div>
                <div></div>
            </header>

            <div class="chat-area">
                <div class="empty-state">Mulai percakapan...</div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <button class="add-btn">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                        </button>
                        <input type="text" class="chat-input" placeholder="Tanya apa saja">
                        <button class="mic-btn">
                            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                            </svg>
                        </button>
                    </div>
                    <div class="powered-by">
                        <span>Powered By:</span>
                        <div class="gemini-badge">
                            <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                            Gemini
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menuToggleBtn = document.getElementById('menuToggleBtn');
        let isMobile = window.innerWidth <= 768;

        function toggleSidebar() {
            if (isMobile) {
                sidebar.classList.remove('collapsed');
                overlay.classList.add('active');
            } else {
                sidebar.classList.toggle('collapsed');
            }
        }

        menuToggleBtn.addEventListener('click', toggleSidebar);

        overlay.addEventListener('click', function() {
            sidebar.classList.add('collapsed');
            overlay.classList.remove('active');
        });

        window.addEventListener('resize', function() {
            isMobile = window.innerWidth <= 768;
            if (!isMobile) {
                overlay.classList.remove('active');
            }
        });

        document.querySelector('.new-chat').addEventListener('click', function() {
            document.querySelector('.chat-input').value = '';
            document.querySelector('.empty-state').textContent = 'Mulai percakapan...';
        });

        document.querySelector('.chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.trim()) {
                const msg = this.value.trim();
                const chatArea = document.querySelector('.chat-area');
                chatArea.innerHTML = '<div style="text-align:center;color:#333;font-size:16px;">Anda: ' + msg.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>';
                this.value = '';
            }
        });
    </script>
</body>
</html>
